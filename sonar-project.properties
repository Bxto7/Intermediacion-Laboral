sonar.projectKey=linku-intermediacion-laboral
sonar.projectName=Linku - Sistema de Intermediacion Laboral
sonar.projectVersion=1.0

# Encoding
sonar.sourceEncoding=UTF-8

# ─── Backend (Python) ────────────────────────────────────────────────────────
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests

sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml

sonar.exclusions=\
  **/node_modules/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  **/migrations/**,\
  **/dist/**,\
  **/build/**,\
  **/.venv/**,\
  **/venv/**,\
  frontend/src/vite-env.d.ts

sonar.test.inclusions=backend/tests/**/*.py

# ─── Frontend (TypeScript/React) ─────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info

# ─── SonarQube server (localhost via Docker) ──────────────────────────────────
sonar.host.url=http://localhost:9000
sonar.login=admin
sonar.password=admin
