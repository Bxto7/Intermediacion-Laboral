name: CI/CD — Intermediación Laboral

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository }}/backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository }}/frontend

jobs:
  # ── 1. Lint ───────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff==0.8.4
      - run: ruff check backend/ && ruff format --check backend/

  # ── 2. Tests backend ──────────────────────────────────────────
  test-backend:
    name: Tests Backend
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql+asyncpg://test_user:test_pass@localhost:5432/test_db
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key-32-chars-long!
      AES_KEY: ${{ secrets.AES_KEY_TEST }}
      JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY_TEST }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY_TEST }}
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          python -m spacy download es_core_news_md
      - name: Run migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Run tests
        working-directory: backend
        run: pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80 -q
      - uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  # ── 3. Tests frontend ─────────────────────────────────────────
  test-frontend:
    name: Tests Frontend
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --prefix frontend
      - run: npm run build --prefix frontend

  # ── 4. Build Docker images ────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
            ${{ env.IMAGE_FRONTEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. Deploy staging ─────────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to staging
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_STAGING }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "$GCP_SA_KEY" | gcloud auth activate-service-account --key-file=-
          gcloud run deploy intermediacion-backend-staging \
            --image=${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            --project=$GCP_PROJECT \
            --region=us-central1 \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="ENVIRONMENT=staging"
      - name: Smoke test staging
        run: |
          sleep 15
          curl -f ${{ secrets.STAGING_URL }}/api/v1/ping || exit 1

  # ── 6. Deploy production ───────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to production
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY_PROD }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo "$GCP_SA_KEY" | gcloud auth activate-service-account --key-file=-
          gcloud run deploy intermediacion-backend \
            --image=${{ env.IMAGE_BACKEND }}:${{ github.sha }} \
            --project=$GCP_PROJECT \
            --region=us-central1 \
            --platform=managed \
            --min-instances=1 \
            --set-env-vars="ENVIRONMENT=production"

  # ── 7. Notificar resultado ────────────────────────────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    steps:
      - name: Pipeline status
        run: |
          echo "Pipeline completado para ${{ github.sha }}"
          echo "Resultado: ${{ job.status }}"
